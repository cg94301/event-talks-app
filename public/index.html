<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTalk 2026 - Event Schedule</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>TechTalk 2026</h1>
            <p>1-Day Intensive Track of Innovation</p>
        </div>
    </header>

    <main class="container">
        <section class="search-section">
            <input type="text" id="categorySearch" placeholder="Search talks by category (e.g. Node.js, Performance)...">
        </section>

        <section id="schedule" class="schedule-section">
            <!-- Schedule will be rendered here -->
            <div id="loading">Loading schedule...</div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 TechTalk. All rights reserved.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
